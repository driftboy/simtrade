<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block print_title %}单证{% endblock %}</title>
    <style>
        @page {
            margin: 15mm;
            size: A4;
        }
        body {
            font-family: "SimSun", "宋体", serif;
            font-size: 10pt;
            line-height: 1.5;
        }
        .print-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .print-header h1 {
            font-size: 18pt;
            margin: 5px 0;
        }
        .print-header h2 {
            font-size: 14pt;
            margin: 5px 0;
            font-weight: normal;
        }
        .print-table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
        }
        .print-table th,
        .print-table td {
            border: 1px solid #000;
            padding: 5px;
            text-align: left;
        }
        .print-table th {
            background-color: #f0f0f0;
            text-align: center;
        }
        .print-table .text-right {
            text-align: right;
        }
        .print-table .text-center {
            text-align: center;
        }
        .print-footer {
            margin-top: 30px;
            page-break-inside: avoid;
        }
        .sign-box {
            display: inline-block;
            width: 45%;
            margin: 20px 0;
        }
        .sign-box .label {
            display: block;
            border-bottom: 1px solid #000;
            padding-bottom: 20px;
            margin-top: 40px;
        }
        @media print {
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>
    {% block print_content %}
    {% endblock %}
</body>
</html>
