{% extends "base.html" %}
{% load static %}

{% block title %}教学管理 - SimTrade{% endblock %}

{% block extra_css %}
<link href="{% static 'css/teaching.css' %}" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <h2>教学管理
            <a href="/teaching/courses/" class="btn btn-primary pull-right">创建课程</a>
        </h2>
        <hr>
    </div>
</div>

<div class="row">
    <!-- 左栏: 我的课程 -->
    <div class="col-md-8">
        <div class="panel panel-default">
            <div class="panel-heading">
                <h3 class="panel-title">我的课程</h3>
            </div>
            <div class="panel-body" id="course-list">
                <div class="text-center">加载中...</div>
            </div>
        </div>
    </div>

    <!-- 右栏: 快捷入口 + 待审核 -->
    <div class="col-md-4">
        <div class="panel panel-default">
            <div class="panel-heading">
                <h3 class="panel-title">快捷入口</h3>
            </div>
            <div class="panel-body">
                <a href="/teaching/courses/" class="btn btn-default btn-block">课程列表</a>
                <a href="/teaching/grading/" class="btn btn-default btn-block">成绩管理</a>
            </div>
        </div>

        <div class="panel panel-default">
            <div class="panel-heading">
                <h3 class="panel-title">待审核角色</h3>
            </div>
            <div class="panel-body" id="pending-roles">
                <div class="text-center">加载中...</div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/teaching.js' %}"></script>
<script>
$(document).ready(function() {
    'use strict';

    // 加载课程列表
    loadCourses();

    // 加载待审核角色
    $.ajax({
        url: '/api/v1/my-roles/pending/',
        method: 'GET',
        success: function(response) {
            var html = '';
            var roles = response.data || [];
            if (roles.length === 0) {
                html = '<p class="text-muted">暂无待审核角色</p>';
            } else {
                html = '<ul class="list-group">';
                roles.forEach(function(r) {
                    html += '<li class="list-group-item">' +
                        '<strong>' + (r.role_name || '') + '</strong> - ' +
                        (r.username || '') + ' (' + (r.company_name || '') + ')' +
                    '</li>';
                });
                html += '</ul>';
            }
            $('#pending-roles').html(html);
        },
        error: function() {
            $('#pending-roles').html('<p class="text-danger">加载失败</p>');
        }
    });
});
</script>
{% endblock %}
