{% extends "base.html" %}
{% load static %}

{% block title %}交易详情 - SimTrade{% endblock %}

{% block extra_css %}
<link href="{% static 'css/transactions.css' %}" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <div id="transactionDetail">
            <div class="text-center">加载中...</div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-md-12">
        <div class="panel panel-default">
            <div class="panel-heading">磋商记录</div>
            <div class="panel-body">
                <div id="messageList"></div>
                <div id="messageForm" style="margin-top: 20px;">
                    <textarea id="messageContent" class="form-control" rows="3" placeholder="输入消息内容..."></textarea>
                    <div class="form-group" style="margin-top: 10px;">
                        <label>商品名称</label>
                        <input type="text" id="offerProductName" class="form-control" placeholder="商品名称" required>
                        <input type="hidden" id="offerProductCode">
                    </div>
                    <div class="row" style="margin-top: 10px;">
                        <div class="col-md-6">
                            <label>付款方式</label>
                            <select id="offerPaymentTerm" class="form-control">
                                <option value="">请选择</option>
                                <option value="lc">信用证 (L/C)</option>
                                <option value="dp">付款交单 (D/P)</option>
                                <option value="da">承兑交单 (D/A)</option>
                                <option value="tt">电汇 (T/T)</option>
                                <option value="tt_advance">前T/T (预付)</option>
                                <option value="tt_sight">后T/T (货到付款)</option>
                                <option value="wu">西联汇款</option>
                                <option value="other">其他</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label>交货日期</label>
                            <input type="date" id="offerDeliveryDate" class="form-control">
                        </div>
                    </div>
                    <div class="row" style="margin-top: 10px;">
                        <div class="col-md-4">
                            <label>包装要求</label>
                            <input type="text" id="offerPacking" class="form-control" placeholder="如：纸箱包装">
                        </div>
                        <div class="col-md-4">
                            <label>质量标准</label>
                            <input type="text" id="offerQualityStandard" class="form-control" placeholder="如：ISO9001">
                        </div>
                        <div class="col-md-4">
                            <label>保险条款</label>
                            <input type="text" id="offerInsurance" class="form-control" placeholder="如：由买方办理">
                        </div>
                    </div>
                    <div class="row" style="margin-top: 10px;">
                        <div class="col-md-6">
                            <button id="sendMessageBtn" class="btn btn-primary btn-block">发送</button>
                        </div>
                        <div class="col-md-6">
                            <button id="acceptOfferBtn" class="btn btn-success btn-block">接受报价</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
$(document).ready(function() {
    'use strict';

    var transactionId = window.location.pathname.split('/')[2];

    function loadTransactionDetail() {
        $.ajax({
            url: '/api/v1/transactions/' + transactionId + '/',
            method: 'GET',
            success: function(response) {
                var tx = response.data;
                var html = `
                    <div class="panel panel-default">
                        <div class="panel-heading">
                            <h3>交易 #${tx.id} - <span class="status-badge ${tx.status}">${tx.status_display}</span></h3>
                        </div>
                        <div class="panel-body">
                            <div class="row">
                                <div class="col-md-6">
                                    <p><strong>买方:</strong> ${tx.buyer_name || tx.buyer_company_name || '未指定'}</p>
                                    <p><strong>卖方:</strong> ${tx.seller_name || tx.seller_company_name || '未指定'}</p>
                                </div>
                                <div class="col-md-6">
                                    <p><strong>数量:</strong> ${tx.quantity}</p>
                                    <p><strong>单价:</strong> $${tx.unit_price}</p>
                                    <p><strong>贸易术语:</strong> ${tx.trade_term || '未指定'}</p>
                                </div>
                            </div>
                            <div class="row" style="margin-top: 15px;">
                                <div class="col-md-6">
                                    <p><strong>付款方式:</strong> ${tx.payment_term_display || '未协商'}</p>
                                    <p><strong>交货日期:</strong> ${tx.delivery_date || '未协商'}</p>
                                </div>
                                <div class="col-md-6">
                                    <p><strong>包装要求:</strong> ${tx.packing || '未协商'}</p>
                                    <p><strong>保险条款:</strong> ${tx.insurance || '未协商'}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                $('#transactionDetail').html(html);
            },
            error: function(xhr) {
                $('#transactionDetail').html('<div class="alert alert-danger">加载失败: ' + (xhr.responseJSON?.message || '未知错误') + '</div>');
            }
        });
    }

    function loadMessages() {
        $.ajax({
            url: '/api/v1/transactions/' + transactionId + '/messages/',
            method: 'GET',
            success: function(response) {
                var html = '<div class="clearfix">';
                if (response.data.length === 0) {
                    html += '<div class="alert alert-info">暂无消息</div>';
                } else {
                    response.data.forEach(function(msg) {
                        var bubbleClass = msg.sender_role === 'buyer' ? 'bubble-right' : 'bubble-left';
                        var typeLabel = msg.message_type_display;
                        var negotiationDetails = '';
                        if (msg.offered_product_name || msg.offered_payment_term || msg.offered_delivery_date || msg.offered_packing || msg.offered_quality_standard || msg.offered_insurance) {
                            negotiationDetails = '<div class="negotiation-details" style="margin-top: 5px; padding: 5px; background: #f5f5f5; border-radius: 3px;">';
                            if (msg.offered_product_name) negotiationDetails += '<div><strong>商品:</strong> ' + msg.offered_product_name + '</div>';
                            if (msg.offered_payment_term_display) negotiationDetails += '<div><strong>付款方式:</strong> ' + msg.offered_payment_term_display + '</div>';
                            if (msg.offered_delivery_date) negotiationDetails += '<div><strong>交货日期:</strong> ' + msg.offered_delivery_date + '</div>';
                            if (msg.offered_packing) negotiationDetails += '<div><strong>包装:</strong> ' + msg.offered_packing + '</div>';
                            if (msg.offered_quality_standard) negotiationDetails += '<div><strong>质量标准:</strong> ' + msg.offered_quality_standard + '</div>';
                            if (msg.offered_insurance) negotiationDetails += '<div><strong>保险:</strong> ' + msg.offered_insurance + '</div>';
                            negotiationDetails += '</div>';
                        }
                        html += `
                            <div class="message-bubble ${bubbleClass}">
                                <strong>${msg.sender_username}</strong> <span class="label label-default">${typeLabel}</span>
                                <p>${msg.content}</p>
                                ${msg.offered_price ? '<p><strong>报价: $' + msg.offered_price + '</strong></p>' : ''}
                                ${negotiationDetails}
                                <div class="message-time">${msg.created_at}</div>
                            </div>
                        `;
                    });
                }
                html += '</div>';
                $('#messageList').html(html);
            },
            error: function(xhr) {
                $('#messageList').html('<div class="alert alert-danger">加载失败: ' + (xhr.responseJSON?.message || '未知错误') + '</div>');
            }
        });
    }

    function sendMessage(messageType) {
        var content = $('#messageContent').val();
        if (!content && messageType === 'offer') {
            alert('请输入消息内容');
            return;
        }

        var data = {
            message_type: messageType,
            content: content || '接受报价',
            offered_product_name: $('#offerProductName').val() || window.currentProductName || '未指定',
            offered_product_code: window.currentProductCode || '',
            offered_payment_term: $('#offerPaymentTerm').val() || null,
            offered_delivery_date: $('#offerDeliveryDate').val() || null,
            offered_packing: $('#offerPacking').val() || null,
            offered_quality_standard: $('#offerQualityStandard') ? $('#offerQualityStandard').val() : null,
            offered_insurance: $('#offerInsurance').val() || null
        };

        $.ajax({
            url: '/api/v1/transactions/' + transactionId + '/send_message/',
            method: 'POST',
            data: JSON.stringify(data),
            contentType: 'application/json',
            headers: {
                'X-CSRFToken': $.cookie('csrftoken')
            },
            success: function(response) {
                $('#messageContent').val('');
                $('#offerProductName').val('');
                $('#offerProductCode').val('');
                $('#offerPaymentTerm').val('');
                $('#offerDeliveryDate').val('');
                $('#offerPacking').val('');
                $('#offerQualityStandard').val('');
                $('#offerInsurance').val('');
                loadMessages();
                loadTransactionDetail();
            },
            error: function(xhr) {
                alert('发送失败: ' + (xhr.responseJSON?.message || '未知错误'));
            }
        });
    }

    $('#sendMessageBtn').click(function() {
        sendMessage('offer');
    });

    $('#acceptOfferBtn').click(function() {
        sendMessage('accept');
    });

    loadTransactionDetail();
    loadMessages();
});
</script>
{% endblock %}
