{% extends "base.html" %}
{% load static %}

{% block title %}管理后台 - SimTrade{% endblock %}

{% block extra_css %}
<link href="{% static 'css/dashboard.css' %}" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <h2>管理后台</h2>
        <hr>
    </div>
</div>

<!-- 统计卡片 -->
<div class="row dashboard-stats">
    <div class="col-md-3">
        <div class="dash-stat-card">
            <div class="dash-stat-icon">
                <span class="glyphicon glyphicon-user"></span>
            </div>
            <div class="dash-stat-value" id="stat-total-users">-</div>
            <div class="dash-stat-label">总用户数</div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="dash-stat-card">
            <div class="dash-stat-icon">
                <span class="glyphicon glyphicon-education"></span>
            </div>
            <div class="dash-stat-value" id="stat-total-courses">-</div>
            <div class="dash-stat-label">总课程数</div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="dash-stat-card">
            <div class="dash-stat-icon">
                <span class="glyphicon glyphicon-list-alt"></span>
            </div>
            <div class="dash-stat-value" id="stat-active-semesters">-</div>
            <div class="dash-stat-label">活跃学期</div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="dash-stat-card">
            <div class="dash-stat-icon">
                <span class="glyphicon glyphicon-briefcase"></span>
            </div>
            <div class="dash-stat-value" id="stat-total-companies">-</div>
            <div class="dash-stat-label">总公司数</div>
        </div>
    </div>
</div>

<!-- 快捷入口 -->
<div class="row">
    <div class="col-md-12">
        <div class="panel panel-default">
            <div class="panel-heading">
                <h3 class="panel-title">快捷入口</h3>
            </div>
            <div class="panel-body dash-quick-actions">
                <a href="/admin-panel/users/" class="btn btn-primary">用户管理</a>
                <a href="/admin-panel/system/" class="btn btn-primary">系统设置</a>
                <a href="/teaching/" class="btn btn-default">教学管理</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
$(document).ready(function() {
    'use strict';

    // 加载统计数据
    $.get('/api/v1/auth/users/', function(resp) {
        var users = resp.data || resp.results || resp || [];
        $('#stat-total-users').text(users.length || 0);
    }).fail(function() {
        $('#stat-total-users').text('-');
    });

    $.get('/api/v1/teaching/courses/', function(resp) {
        var courses = resp.data || resp.results || resp || [];
        $('#stat-total-courses').text(courses.length || 0);
    }).fail(function() {
        $('#stat-total-courses').text('-');
    });

    $.get('/api/v1/teaching/semesters/', function(resp) {
        var semesters = resp.data || resp.results || resp || [];
        var active = 0;
        for (var i = 0; i < semesters.length; i++) {
            if (semesters[i].status === 'active') active++;
        }
        $('#stat-active-semesters').text(active);
    }).fail(function() {
        $('#stat-active-semesters').text('-');
    });

    $.get('/api/v1/roles/companies/', function(resp) {
        var companies = resp.data || resp.results || resp || [];
        $('#stat-total-companies').text(companies.length || 0);
    }).fail(function() {
        $('#stat-total-companies').text('-');
    });
});
</script>
{% endblock %}
