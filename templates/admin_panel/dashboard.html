{% extends "base.html" %}
{% load static %}

{% block title %}管理后台 - SimTrade{% endblock %}

{% block extra_css %}
<link href="{% static 'css/dashboard.css' %}" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="row" style="margin-bottom:8px;">
    <div class="col-md-12">
        <h4 style="font-weight:600;color:#262626;margin:0;">管理后台</h4>
    </div>
</div>

<!-- 统计卡片 -->
<div class="row dashboard-stats">
    <div class="col-md-3">
        <a href="/admin-panel/users/" class="dash-stat-card card-blue">
            <div class="dash-stat-icon"><span class="glyphicon glyphicon-user"></span></div>
            <div class="dash-stat-info">
                <div class="dash-stat-label">总用户数</div>
            </div>
            <div class="dash-stat-right">
                <div class="dash-stat-value" id="stat-total-users">-</div>
                <span class="dash-stat-arrow glyphicon glyphicon-menu-right"></span>
            </div>
        </a>
    </div>
    <div class="col-md-3">
        <a href="/teaching/" class="dash-stat-card card-green">
            <div class="dash-stat-icon"><span class="glyphicon glyphicon-education"></span></div>
            <div class="dash-stat-info">
                <div class="dash-stat-label">总课程数</div>
            </div>
            <div class="dash-stat-right">
                <div class="dash-stat-value" id="stat-total-courses">-</div>
                <span class="dash-stat-arrow glyphicon glyphicon-menu-right"></span>
            </div>
        </a>
    </div>
    <div class="col-md-3">
        <a href="/admin-panel/system/" class="dash-stat-card card-orange">
            <div class="dash-stat-icon"><span class="glyphicon glyphicon-list-alt"></span></div>
            <div class="dash-stat-info">
                <div class="dash-stat-label">活跃学期</div>
            </div>
            <div class="dash-stat-right">
                <div class="dash-stat-value" id="stat-active-semesters">-</div>
                <span class="dash-stat-arrow glyphicon glyphicon-menu-right"></span>
            </div>
        </a>
    </div>
    <div class="col-md-3">
        <a href="/admin-panel/system/" class="dash-stat-card card-purple">
            <div class="dash-stat-icon"><span class="glyphicon glyphicon-briefcase"></span></div>
            <div class="dash-stat-info">
                <div class="dash-stat-label">总公司数</div>
            </div>
            <div class="dash-stat-right">
                <div class="dash-stat-value" id="stat-total-companies">-</div>
                <span class="dash-stat-arrow glyphicon glyphicon-menu-right"></span>
            </div>
        </a>
    </div>
</div>

<!-- 快捷入口 -->
<div class="row">
    <div class="col-md-12">
        <div class="panel panel-default dash-panel">
            <div class="panel-heading">
                <h3 class="panel-title">快捷入口</h3>
            </div>
            <div class="panel-body">
                <div class="dash-quick-actions">
                    <a href="/admin-panel/users/" class="dash-quick-link">
                        <span class="glyphicon glyphicon-user"></span> 用户管理
                    </a>
                    <a href="/admin-panel/system/" class="dash-quick-link">
                        <span class="glyphicon glyphicon-cog"></span> 系统设置
                    </a>
                    <a href="/teaching/" class="dash-quick-link">
                        <span class="glyphicon glyphicon-book"></span> 教学管理
                    </a>
                    <a href="/market/" class="dash-quick-link">
                        <span class="glyphicon glyphicon-shopping-cart"></span> 市场大厅
                    </a>
                    <a href="/profile/" class="dash-quick-link">
                        <span class="glyphicon glyphicon-user"></span> 个人信息
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
$(document).ready(function() {
    'use strict';

    $.get('/api/v1/auth/users/', function(resp) {
        var users = resp.data || [];
        $('#stat-total-users').text(users.length);
    }).fail(function() {
        $('#stat-total-users').text('-');
    });

    $.get('/api/v1/teaching/courses/', function(resp) {
        var count = resp.count || (resp.results || []).length;
        $('#stat-total-courses').text(count);
    }).fail(function() {
        $('#stat-total-courses').text('-');
    });

    $.get('/api/v1/teaching/semesters/', function(resp) {
        var semesters = resp.results || resp.data || [];
        var active = 0;
        for (var i = 0; i < semesters.length; i++) {
            if (semesters[i].status === 'active') active++;
        }
        $('#stat-active-semesters').text(active);
    }).fail(function() {
        $('#stat-active-semesters').text('-');
    });

    $.get('/api/v1/companies/', function(resp) {
        var count = resp.count || (resp.results || []).length;
        $('#stat-total-companies').text(count);
    }).fail(function() {
        $('#stat-total-companies').text('-');
    });
});
</script>
{% endblock %}
